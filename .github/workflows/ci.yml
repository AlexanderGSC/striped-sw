name: C++ CI / RISC-V RVV Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Toolchain and QEMU
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          ninja-build \
          g++-riscv64-linux-gnu \
          gcc-riscv64-linux-gnu \
          qemu-user

    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_C_COMPILER=riscv64-linux-gnu-gcc \
          -DCMAKE_CXX_COMPILER=riscv64-linux-gnu-g++ \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: |
        cmake --build build

    - name: Run Tests via QEMU
      run: |
        qemu-riscv64 -L /usr/riscv64-linux-gnu ./build/unit_tests1
        qemu-riscv64 -L /usr/riscv64-linux-gnu ./build/unit_tests2
