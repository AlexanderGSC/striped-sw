strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: "GCC 13"
            cc: "riscv64-linux-gnu-gcc"
            cxx: "riscv64-linux-gnu-g++"
            extra_flags: ""
          - compiler: "Clang 18"
            cc: "clang"
            cxx: "clang++"
            extra_flags: "-DCMAKE_CXX_FLAGS=--target=riscv64-linux-gnu -DCMAKE_EXE_LINKER_FLAGS=--target=riscv64-linux-gnu"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Toolchain and QEMU
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          ninja-build \
          g++-riscv64-linux-gnu \
          gcc-riscv64-linux-gnu \
          clang \
          qemu-user

    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_C_COMPILER=${{ matrix.cc }} \
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
          ${{ matrix.extra_flags }} \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: |
        cmake --build build

    - name: Run Tests via CTest
      run: |
        cd build && ctest --output-on-failure